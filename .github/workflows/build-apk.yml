name: Build Mineradio Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Mineradio Android
      uses: actions/checkout@v4

    - name: Checkout Original Mineradio (frontend source)
      uses: actions/checkout@v4
      with:
        repository: XxHuberrr/Mineradio
        path: Mineradio

    - name: Debug - show workspace
      run: |
        echo "Workspace: $GITHUB_WORKSPACE"
        ls -la $GITHUB_WORKSPACE
        echo "---"
        ls $GITHUB_WORKSPACE/Mineradio/public/ 2>/dev/null || echo "Mineradio/public not found"
        echo "---"
        ls $GITHUB_WORKSPACE/Mineradio-Android/scripts/ 2>/dev/null || echo "scripts not found"

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install npm dependencies
      run: npm install

    - name: Patch frontend (copy & adapt index.html)
      run: |
        export MINERADIO_SRC="$GITHUB_WORKSPACE/Mineradio"
        node scripts/patch-index.js

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Build Debug APK
      working-directory: android
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
      run: ./gradlew assembleDebug

    - name: Build Release APK (unsigned)
      working-directory: android
      run: ./gradlew assembleRelease

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: mineradio-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: mineradio-release
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
